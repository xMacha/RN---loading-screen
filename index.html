<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • Twój Serwer GMod</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: #000000;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Tło slideshow (przyciemnione) */
        #slideshow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        #slideshow::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.68);
            z-index: 2;
            pointer-events: none;
        }

        /* Logo na środku */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
        }

        .logo {
            width: 460px;
            max-width: 85vw;
            filter: brightness(1.1) contrast(1.05);
            transition: transform 0.4s ease;
        }

        /* Status – dokładnie to co pokazuje okienko GMod */
        .status-container {
            position: absolute;
            bottom: 105px;
            left: 40px;
            z-index: 4;
            font-size: 1.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            max-width: 75%;
            opacity: 0.98;
            text-align: left;
        }

        /* PASEK – grubszy + niezaładowana część przezroczysto-szara */
        .progress-wrapper {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .progress-container {
            flex: 1;
            height: 18px;                    /* grubszy pasek */
            background: rgba(255,255,255,0.14); /* przezroczysto-szara niezaładowana część */
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 14px rgba(255,255,255,0.75);
        }

        /* Muzyka */
        audio { display: none; }
    </style>
</head>
<body>

    <!-- Tło slideshow -->
    <div id="slideshow"></div>

    <!-- Logo -->
    <div class="logo-container">
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/460x200/111/fff?text=LOGO';">
    </div>

    <!-- Status – dokładnie to co w okienku GMod -->
    <div class="status-container" id="loading-status">
        Oczekiwanie na serwer...
    </div>

    <!-- Pasek postępu -->
    <div class="progress-wrapper">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <!-- Muzyka w tle -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ====================== SLIDESHOW ======================
        const slides = [
            "slide1.jpg",
            "slide2.jpg",
            "slide3.jpg",
            "slide4.jpg",
            // dodaj więcej linijek jeśli masz więcej slajdów
        ];

        const slideshowContainer = document.getElementById('slideshow');
        slides.forEach((src, i) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = `url('${src}')`;
            if (i === 0) div.classList.add('active');
            slideshowContainer.appendChild(div);
        });

        let current = 0;
        setInterval(() => {
            const all = document.querySelectorAll('.slide');
            all[current].classList.remove('active');
            current = (current + 1) % slides.length;
            all[current].classList.add('active');
        }, 15000);

        // ====================== DANE OD GMOD ======================
        const statusText = document.getElementById('loading-status');
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');

        let totalFiles = 0;
        let neededFiles = 0;

        function updateRealProgress() {
            if (totalFiles > 0) {
                const progress = Math.max(0, Math.min(100, ((totalFiles - neededFiles) / totalFiles) * 100));
                progressBar.style.width = `${progress}%`;
                percentText.textContent = `${Math.floor(progress)}%`;
            }
        }

        // 1. Główny status (dokładnie to co pokazuje okienko GMod)
        window.SetStatusChanged = function(status) {
            if (status && typeof status === 'string') {
                statusText.textContent = status;
            }
        };

        // 2. Pobieranie konkretnego pliku
        window.DownloadingFile = function(fileName) {
            if (fileName && typeof fileName === 'string') {
                statusText.textContent = `Pobieranie: ${fileName}`;
            }
        };

        // 3. Informacje o serwerze / mapie
        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            statusText.textContent = `Pobieranie informacji o serwerze`;
        };

        // 4. Liczba plików do pobrania
        window.SetFilesTotal = function(total) {
            totalFiles = total;
            updateRealProgress();
        };

        window.SetFilesNeeded = function(needed) {
            neededFiles = needed;
            updateRealProgress();
        };

        // Fallback – postMessage od GMod (działa na niektórych serwerach)
        window.addEventListener('message', function(e) {
            if (!e.data) return;

            if (typeof e.data.progress === 'number') {
                progressBar.style.width = `${Math.min(100, Math.max(0, e.data.progress))}%`;
                percentText.textContent = `${Math.floor(e.data.progress)}%`;
            }
            if (e.data.status || e.data.message) {
                statusText.textContent = e.data.status || e.data.message;
            }
        });

        // ====================== MUZYKA ======================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.45;
        audio.play().catch(() => {
            document.body.addEventListener('click', () => audio.play(), { once: true });
        });

    </script>
</body>
</html>
