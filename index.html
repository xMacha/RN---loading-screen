<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • [REDACTED] Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: #000000;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Tło slideshow (przyciemnione) */
        #slideshow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        #slideshow::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.68);
            z-index: 2;
            pointer-events: none;
        }

        /* Logo na środku */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
        }

        .logo {
            width: 460px;
            max-width: 85vw;
            filter: brightness(1.1) contrast(1.05);
            transition: transform 0.4s ease;
        }

        /* Status – dokładnie to co pokazuje okienko GMod */
        .status-container {
            position: absolute;
            bottom: 105px;
            left: 40px;
            z-index: 4;
            font-size: 1.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            max-width: 75%;
            opacity: 0.98;
            text-align: left;
        }

        /* LINK DO DISCORDA – lewy górny róg */
        .discord-link {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 500;
            opacity: 0.9;
            transition: all 0.2s ease;
        }

        .discord-link:hover {
            opacity: 1;
            text-decoration: underline;
            transform: translateY(-1px);
        }

        .discord-icon {
            width: 28px;
            height: 28px;
        }

        /* Muzyka */
        audio { display: none; }
    </style>
</head>
<body>

    <!-- Tło slideshow -->
    <div id="slideshow"></div>

    <!-- Logo na środku -->
    <div class="logo-container">
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/460x200/111/fff?text=LOGO';">
    </div>

    <!-- Status od GMod -->
    <div class="status-container" id="loading-status">
        Oczekiwanie na serwer...
    </div>

    <!-- LINK DO DISCORDA (lewy górny róg) -->
    <a href="https://discord.gg/twojserwer" target="_blank" class="discord-link">
        <!-- Ikonka Discord (biała, inline SVG) -->
        <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M20.317 4.492a19.562 19.562 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.445.863-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.562 19.562 0 0 0 3.677 4.5a.078.078 0 0 0-.032.027C.533 9.094-.32 13.555.099 17.961a.078.078 0 0 0 .032.027 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.077.077 0 0 0-.041-.108 13.07 13.07 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.322 10.322 0 0 0 .372-.18.076.076 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.076.076 0 0 1 .077.01c.12.064.245.13.373.18a.077.077 0 0 1-.007.128 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.108c.36.698.772 1.363 1.225 1.993a.078.078 0 0 0 .084.028 19.9 19.9 0 0 0 5.993-3.03.078.078 0 0 0 .032-.027c.492-4.564-.83-8.52-3.51-12.442a.077.077 0 0 0-.032-.027zM8.02 15.33c-1.182 0-2.157-1.085-2.157-2.419 0-1.334.984-2.419 2.157-2.419 1.182 0 2.157 1.085 2.157 2.419 0 1.334-.984 2.419-2.157 2.419zm7.96 0c-1.182 0-2.157-1.085-2.157-2.419 0-1.334.984-2.419 2.157-2.419 1.183 0 2.157 1.085 2.157 2.419 0 1.334-.975 2.419-2.157 2.419z"/>
        </svg>
        Discord
    </a>

    <!-- Muzyka w tle -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ====================== SLIDESHOW ======================
        const slides = [
            "slide1.jpg",
            "slide2.jpg",
            "slide3.jpg",
            "slide4.jpg",
            // dodaj więcej linijek jeśli masz więcej slajdów
        ];

        const slideshowContainer = document.getElementById('slideshow');
        slides.forEach((src, i) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = `url('${src}')`;
            if (i === 0) div.classList.add('active');
            slideshowContainer.appendChild(div);
        });

        let current = 0;
        setInterval(() => {
            const all = document.querySelectorAll('.slide');
            all[current].classList.remove('active');
            current = (current + 1) % slides.length;
            all[current].classList.add('active');
        }, 15000);

        // ====================== DANE OD GMOD ======================
        const statusText = document.getElementById('loading-status');

        window.SetStatusChanged = function(status) {
            if (status && typeof status === 'string') {
                statusText.textContent = status;
            }
        };

        window.DownloadingFile = function(fileName) {
            if (fileName && typeof fileName === 'string') {
                statusText.textContent = `Pobieranie: ${fileName}`;
            }
        };

        window.GameDetails = function(servername, serverurl, mapname) {
            statusText.textContent = `Wczytywanie mapy: ${mapname}`;
        };

        // Fallback – postMessage
        window.addEventListener('message', function(e) {
            if (!e.data) return;
            if (e.data.status || e.data.message) {
                statusText.textContent = e.data.status || e.data.message;
            }
        });

        // ====================== MUZYKA ======================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.45;
        audio.play().catch(() => {
            document.body.addEventListener('click', () => audio.play(), { once: true });
        });

        console.log('%c✅ Pasek usunięty • Link do Discorda dodany w lewym górnym rogu', 'color:#fff; font-size:16px; font-family:monospace');
    </script>
</body>
</html>
