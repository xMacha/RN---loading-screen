<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • Twój Serwer GMod</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap');

        :root {
            --neon-cyan: #00f7ff;
            --neon-blue: #00aaff;
            --dark-bg: #0a0a1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtelne tło z siatką (fajny cyber-tech vibe) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 247, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 247, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
            animation: gridMove 40s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 820px;
            padding: 40px 20px;
        }

        /* Logo z neonowym glow i pulsacją */
        .logo {
            width: 420px;
            max-width: 90vw;
            margin: 0 auto 40px;
            filter: 
                drop-shadow(0 0 30px var(--neon-cyan))
                drop-shadow(0 0 60px var(--neon-cyan));
            animation: logoPulse 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 1; }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--neon-cyan), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--neon-cyan);
        }

        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 60px;
            font-weight: 400;
        }

        /* Pasek postępu */
        .progress-wrapper {
            margin: 0 auto;
            width: 100%;
            max-width: 620px;
        }

        .progress-container {
            height: 42px;
            background: rgba(10, 10, 31, 0.8);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 0 20px rgba(0, 247, 255, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(0, 247, 255, 0.2);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
            border-radius: 9999px;
            position: relative;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 0 25px var(--neon-cyan),
                0 0 45px var(--neon-cyan);
        }

        /* Efekt shine (błysk poruszający się po pasku) */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 50%;
            height: 300%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.9),
                transparent
            );
            animation: shine 2.5s linear infinite;
        }

        @keyframes shine {
            0% { transform: translateX(0); }
            100% { transform: translateX(600%); }
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .status {
            opacity: 0.85;
        }

        .percent {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Stopka */
        .footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.95rem;
            opacity: 0.6;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 1px;
        }

        /* Małe animowane kropki na dole */
        .dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 30px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsywność */
        @media (max-width: 640px) {
            .logo { width: 320px; }
            h1 { font-size: 2.2rem; }
            .progress-container { height: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Twojego serwera -->
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/420x200/0a0a1f/00f7ff?text=TWOJE+LOGO';">

        <h1>TWÓJ SERWER GMOD</h1>
        <p class="subtitle">Wczytywanie mapy • Proszę czekać...</p>

        <!-- Pasek postępu -->
        <div class="progress-wrapper">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div class="progress-text">
                <span class="status">ŁADOWANIE ŚWIATA...</span>
                <span id="percent" class="percent">0%</span>
            </div>
        </div>

        <!-- Animowane kropki -->
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="footer">
        Powered by Garry's Mod • <span id="current-time"></span>
    </div>

    <script>
        // === FAKE PROGRESS (działa od razu w przeglądarce i w GMod) ===
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');

        const loadingInterval = setInterval(() => {
            // Losowy, ale realistyczny przyrost (jak prawdziwe ładowanie mapy)
            const increase = Math.random() * 7 + 2.5;
            progress = Math.min(progress + increase, 100);

            progressBar.style.width = `${progress}%`;
            percentText.textContent = `${Math.floor(progress)}%`;

            // Zakończenie ładowania
            if (progress >= 100) {
                clearInterval(loadingInterval);
                percentText.style.color = '#00ff9d';
                percentText.textContent = '100% GOTOWE!';
                
                // Mały efekt "gotowe"
                setTimeout(() => {
                    progressBar.style.boxShadow = '0 0 60px #00ff9d';
                }, 300);
            }
        }, 120);

        // === Obsługa GMod Loading URL (jeśli serwer wysyła dane) ===
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'object') {
                if (typeof event.data.progress !== 'undefined') {
                    progress = Math.min(Math.max(event.data.progress, 0), 100);
                    progressBar.style.width = `${progress}%`;
                    percentText.textContent = `${Math.floor(progress)}%`;
                }
            }
        });

        // Aktualny czas w stopce (fajny detal)
        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                           now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time').textContent = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        console.log('%c✅ Ekran wczytywania dla Twojego serwera GMod gotowy!', 'color:#00f7ff; font-size:15px; font-family:monospace');
    </script>
</body>
</html>
