<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • [REDACTED] Network • SCPRP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --text: #ffffff;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: #000000;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* === TŁO SLIDESHOW (przyciemnione) === */
        #slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        #slideshow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 2;
            pointer-events: none;
        }

        /* === LOGO NA ŚRODKU === */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
        }

        .logo {
            width: 460px;
            max-width: 85vw;
            filter: brightness(1.1) contrast(1.05);
            transition: transform 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.04);
        }

        /* === JEDEN NAPIS ZE STATUSU OD GMOD (powyżej paska) === */
        .status-container {
            position: absolute;
            bottom: 92px;
            left: 40px;
            z-index: 4;
            font-size: 1.45rem;
            font-weight: 500;
            opacity: 0.95;
            letter-spacing: 0.5px;
            text-align: left;
            max-width: 70%;
        }

        /* === PROSTY BIAŁY PASEK POSTĘPU (bez zaokrągleń, grubszy) === */
        .progress-wrapper {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-container {
            flex: 1;
            height: 12px; /* grubość jak prosiłeś */
            background: rgba(255,255,255,0.15);
            border-radius: 0; /* ZERO zaokrągleń */
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }

        .progress-text {
            font-family: 'Inter', monospace;
            font-size: 1.45rem;
            font-weight: 600;
            min-width: 72px;
            text-align: right;
            color: #fff;
        }

        /* === MUZYKA === */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Tło slideshow -->
    <div id="slideshow"></div>

    <!-- Logo na środku -->
    <div class="logo-container">
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/460x200/111/fff?text=LOGO';">
    </div>

    <!-- JEDEN status od GMod (bez żadnej tabeli i losowych rzeczy) -->
    <div class="status-container" id="loading-status">
        Wczytywanie...
    </div>

    <!-- Biały pasek na dole -->
    <div class="progress-wrapper">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-text" id="percent">0%</div>
    </div>

    <!-- Muzyka w tle -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ====================== SLIDESHOW ======================
        const slides = [
            "slide1.jpg",
            "slide2.jpg",
            "slide3.jpg",
            "slide4.jpg",
            // dodaj więcej jeśli chcesz
        ];

        const slideshowContainer = document.getElementById('slideshow');
        
        slides.forEach((slideSrc, index) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = `url('${slideSrc}')`;
            if (index === 0) div.classList.add('active');
            slideshowContainer.appendChild(div);
        });

        let currentSlide = 0;
        function nextSlide() {
            const allSlides = document.querySelectorAll('.slide');
            allSlides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            allSlides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 15000);

        // ====================== PASEK POSTĘPU ======================
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const statusText = document.getElementById('loading-status');

        // Fake progress tylko do testowania w przeglądarce (bez losowych addonów)
        const progressInterval = setInterval(() => {
            progress = Math.min(progress + (Math.random() * 8 + 4), 100);
            progressBar.style.width = `${progress}%`;
            percentText.textContent = `${Math.floor(progress)}%`;

            if (progress >= 100) {
                clearInterval(progressInterval);
                percentText.textContent = "100%";
            }
        }, 130);

        // ====================== DANE OD GMOD ======================
        // 1. GameDetails – oficjalna funkcja wywoływana przez GMod
        window.GameDetails = function(serverName, serverURL, mapName, maxPlayers, steamID, gamemode) {
            // Pokazujemy dokładnie to co podaje GMod (mapa + ewentualnie inne info)
            statusText.textContent = `Wczytywanie mapy: ${mapName}`;
        };

        // 2. postMessage – na wypadek gdyby serwer wysyłał customowy status
        window.addEventListener('message', function(e) {
            if (!e.data) return;

            // Progress (standard w GMod)
            if (typeof e.data.progress === 'number') {
                progress = Math.min(Math.max(e.data.progress, 0), 100);
                progressBar.style.width = `${progress}%`;
                percentText.textContent = `${Math.floor(progress)}%`;

                if (progress >= 100) {
                    percentText.textContent = "100%";
                }
            }

            // Ewentualny customowy status od serwera (jeśli ktoś doda w Lua)
            if (e.data.message || e.data.status || e.data.loading) {
                const msg = e.data.message || e.data.status || e.data.loading;
                if (msg && typeof msg === 'string') {
                    statusText.textContent = msg;
                }
            }
        });

        // ====================== MUZYKA ======================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.45;

        audio.play().catch(() => {
            document.body.addEventListener('click', () => audio.play(), { once: true });
        });

        console.log('%c✅ Ekran wczytywania poprawiony (czarno-biały, prosty pasek, tylko status od GMod)', 'color:#fff; font-size:16px; font-family:monospace');
    </script>
</body>
</html>
