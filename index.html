<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • [REDACTED] Networks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
 
        :root {
            --text: #ffffff;
        }
 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            height: 100vh;
            width: 100vw;
            background: #000000;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }
 
        #slideshow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }
 
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }
 
        .slide.active {
            opacity: 1;
        }
 
        #slideshow::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.68);
            z-index: 2;
            pointer-events: none;
        }
 
        /* Logo na środku */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
        }
 
        .logo {
            width: 460px;
            max-width: 85vw;
            filter: brightness(1.1) contrast(1.05);
        }
 
        /* Porady – 1/4 od dołu */
        .tip-container {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            text-align: center;
            width: 80%;
            max-width: 700px;
        }
 
        .tip-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
 
        .tip-text {
            font-size: 1.05rem;
            font-weight: 400;
            color: #ffffff;
            line-height: 1.55;
            opacity: 1;
            transition: opacity 0.7s ease;
        }
 
        .tip-text.fade {
            opacity: 0;
        }
 
        /* Discord – dół środek */
        .discord-link {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            opacity: 0.9;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
 
        .discord-link:hover {
            opacity: 1;
            text-decoration: underline;
            transform: translateX(-50%) translateY(-2px);
        }
 
        .discord-icon {
            width: 26px;
            height: 26px;
        }
 
        audio { display: none; }
    </style>
</head>
<body>
 
    <div id="slideshow"></div>
 
    <!-- Logo na środku -->
    <div class="logo-container">
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/460x200/111/fff?text=LOGO';">
    </div>
 
    <!-- Porady -->
    <div class="tip-container">
        <div class="tip-label">Porada</div>
        <div class="tip-text" id="tip-text"></div>
    </div>
 
    <!-- Discord – dół środek -->
    <a href="https://discord.gg/RNmq2KWfSB" target="_blank" class="discord-link">
        <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M20.317 4.492a19.562 19.562 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.445.863-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.562 19.562 0 0 0 3.677 4.5a.078.078 0 0 0-.032.027C.533 9.094-.32 13.555.099 17.961a.078.078 0 0 0 .032.027 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.077.077 0 0 0-.041-.108 13.07 13.07 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.322 10.322 0 0 0 .372-.18.076.076 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.076.076 0 0 1 .077.01c.12.064.245.13.373.18a.077.077 0 0 1-.007.128 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.108c.36.698.772 1.363 1.225 1.993a.078.078 0 0 0 .084.028 19.9 19.9 0 0 0 5.993-3.03.078.078 0 0 0 .032-.027c.492-4.564-.83-8.52-3.51-12.442a.077.077 0 0 0-.032-.027zM8.02 15.33c-1.182 0-2.157-1.085-2.157-2.419 0-1.334.984-2.419 2.157-2.419 1.182 0 2.157 1.085 2.157 2.419 0 1.334-.984 2.419-2.157 2.419zm7.96 0c-1.182 0-2.157-1.085-2.157-2.419 0-1.334.984-2.419 2.157-2.419 1.183 0 2.157 1.085 2.157 2.419 0 1.334-.975 2.419-2.157 2.419z"/>
        </svg>
        .gg/RNmq2KWfSB
    </a>
 
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
 
    <script>
        // ====================== SLIDESHOW ======================
        const slides = [
            "slide1.jpg",
            "slide2.jpg",
            "slide3.jpg",
            "slide4.jpg",
        ];
 
        const slideshowContainer = document.getElementById('slideshow');
        slides.forEach((src, i) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = `url('${src}')`;
            if (i === 0) div.classList.add('active');
            slideshowContainer.appendChild(div);
        });
 
        let current = 0;
        setInterval(() => {
            const all = document.querySelectorAll('.slide');
            all[current].classList.remove('active');
            current = (current + 1) % slides.length;
            all[current].classList.add('active');
        }, 15000);
 
        // ====================== PORADY ======================
        const tips = [
            "Używaj /me gdy chcesz wykonać czynność na którą nie pozwalają mechaniki gry",
            "Używaj /do aby opisać otoczenie lub stan twojej postaci np. /do Na stole leży pistolet",
            "Używaj komendy /looc do chatu OOC z graczami w okolicy",
            "Klasa D może się przebrać za naukowca lub ochroniarza przy pomocy szafek w strefie DN",
            "Na serwerz staramy się dążyć do jak najwiekszego poziomu RP, nie sabotuj tego",
            "Użyj f4 aby dostać się do dokumentacji, lore, regulaminu, prac oraz innych przydatnych rzeczy",
            "Użyj f3 aby odblokować kursor",
            "Użyj TAB aby dostać się do listy graczy",
        ];
 
        const tipEl = document.getElementById('tip-text');
        let tipIndex = 0;
 
        function showTip(index) {
            tipEl.classList.add('fade');
            setTimeout(() => {
                tipEl.textContent = tips[index];
                tipEl.classList.remove('fade');
            }, 700);
        }
 
        showTip(0);
 
        setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            showTip(tipIndex);
        }, 15000);
 
        // ====================== MUZYKA ======================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.45;
        audio.play().catch(() => {
            document.body.addEventListener('click', () => audio.play(), { once: true });
        });
    </script>
</body>
</html>
