<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wczytywanie • [REDACTED] Network • SCPRP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --text: #ffffff;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: #000000;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* === TŁO SLIDESHOW (przyciemnione) === */
        #slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Przyciemnienie całego tła */
        #slideshow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 2;
            pointer-events: none;
        }

        /* === LOGO NA ŚRODKU === */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
        }

        .logo {
            width: 460px;
            max-width: 85vw;
            filter: brightness(1.1) contrast(1.05);
            transition: transform 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.04);
        }

        /* === SZCZEGÓŁY WCZYTYWANIA (prawy górny róg nad paskiem) === */
        .details {
            position: absolute;
            bottom: 110px;
            right: 40px;
            z-index: 4;
            text-align: right;
            font-size: 1.05rem;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.4);
            padding: 14px 24px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            min-width: 320px;
        }

        .details-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .details-line:last-child {
            margin-bottom: 0;
        }

        .label {
            opacity: 0.75;
            font-weight: 500;
        }

        .value {
            font-weight: 600;
            color: #fff;
        }

        /* === BIAŁY PASEK POSTĘPU NA DOLE === */
        .progress-wrapper {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ffffff;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }

        .progress-text {
            font-family: 'Inter', monospace;
            font-size: 1.35rem;
            font-weight: 600;
            min-width: 68px;
            text-align: right;
            color: #fff;
        }

        /* === MUZYKA (ukryty player) === */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Tło slideshow -->
    <div id="slideshow"></div>

    <!-- Logo na środku -->
    <div class="logo-container">
        <img src="logoniepng.png" alt="Logo Serwera" class="logo" onerror="this.src='https://via.placeholder.com/460x200/111/fff?text=LOGO';">
    </div>

    <!-- Szczegóły wczytywania (prawy dolny róg, nad paskiem) -->
    <div class="details" id="details">
        <div class="details-line">
            <span class="label">WCZYTYWANIE</span>
            <span class="value" id="loading-item">mapy...</span>
        </div>
        <div class="details-line">
            <span class="label">AKTUALNY ADDON</span>
            <span class="value" id="current-addon">brak</span>
        </div>
    </div>

    <!-- Biały pasek postępu na samym dole -->
    <div class="progress-wrapper">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-text" id="percent">0%</div>
    </div>

    <!-- Tło muzyka -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
        Twój odtwarzacz nie obsługuje audio.
    </audio>

    <script>
        // ====================== SLIDESHOW ======================
        // Dodaj tutaj swoje slajdy (pliki muszą być w głównym folderze repo)
        const slides = [
            "slide1.jpg",
            "slide2.jpg",
            "slide3.jpg",
            "slide4.jpg",
            // dodaj więcej linijek jeśli chcesz więcej slajdów
        ];

        const slideshowContainer = document.getElementById('slideshow');
        
        slides.forEach((slideSrc, index) => {
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = `url('${slideSrc}')`;
            if (index === 0) div.classList.add('active');
            slideshowContainer.appendChild(div);
        });

        let currentSlide = 0;
        function nextSlide() {
            const allSlides = document.querySelectorAll('.slide');
            allSlides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            allSlides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 15000); // 15 sekund na slajd

        // ====================== PASEK POSTĘPU + SZCZEGÓŁY ======================
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const loadingItem = document.getElementById('loading-item');
        const currentAddon = document.getElementById('current-addon');

        // Fake progress + losowe detale (działa od razu w przeglądarce)
        const loadingMessages = [
            "mapy głównej", "modeli graczy", "dodatków serwerowych",
            "skryptów Lua", "tekstur", "dźwięków", "pojazdów"
        ];
        const addonNames = ["DarkRP Base", "Custom Weapons", "Advanced Duplicator 2", "Wiremod", "VCMod"];

        const progressInterval = setInterval(() => {
            const increase = Math.random() * 9 + 3;
            progress = Math.min(progress + increase, 100);

            progressBar.style.width = `${progress}%`;
            percentText.textContent = `${Math.floor(progress)}%`;

            // losowa zmiana szczegółów
            if (Math.random() > 0.7) {
                loadingItem.textContent = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
            }
            if (Math.random() > 0.85) {
                currentAddon.textContent = addonNames[Math.floor(Math.random() * addonNames.length)];
            }

            if (progress >= 100) {
                clearInterval(progressInterval);
                percentText.textContent = "100%";
                loadingItem.textContent = "GOTOWE";
                currentAddon.textContent = "wszystko wczytane";
            }
        }, 110);

        // Obsługa prawdziwych danych z GMod (postMessage)
        window.addEventListener('message', function(e) {
            if (!e.data) return;

            if (typeof e.data.progress === 'number') {
                progress = Math.min(Math.max(e.data.progress, 0), 100);
                progressBar.style.width = `${progress}%`;
                percentText.textContent = `${Math.floor(progress)}%`;
            }

            if (e.data.loading) {
                loadingItem.textContent = e.data.loading;
            }
            if (e.data.addon) {
                currentAddon.textContent = e.data.addon;
            }
        });

        // ====================== MUZYKA ======================
        const audio = document.getElementById('bg-music');
        audio.volume = 0.45; // możesz zmienić głośność (0.0 - 1.0)

        // Autoplay (działa w większości przeglądarek i w GMod)
        audio.play().catch(() => {
            // fallback - kliknięcie na ekranie uruchomi muzykę
            document.body.addEventListener('click', () => {
                audio.play();
            }, { once: true });
        });

        console.log('%c✅ Minimalistyczny ekran wczytywania (czarno-biały) gotowy!', 'color:#fff; font-size:16px; font-family:monospace');
    </script>
</body>
</html>
